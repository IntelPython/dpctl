# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: "docs/_legacy/"
repos:
-   repo: https://github.com/PyCQA/bandit
    rev: '1.9.4'
    hooks:
    -   id: bandit
        pass_filenames: false
        args: ["-r", "dpctl", "-lll"]
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
  # Git
    -   id: check-added-large-files
    -   id: no-commit-to-branch
        name: "ensure no direct commit to master/maintenance branches"
        args: [--branch, "master", --pattern, "maintenance/.*"]
    -   id: check-case-conflict
    -   id: check-illegal-windows-names
    -   id: check-ast
    -   id: check-builtin-literals
    -   id: check-case-conflict
    -   id: check-executables-have-shebangs
    -   id: check-merge-conflict
    -   id: check-shebang-scripts-are-executable
    -   id: check-symlinks
    -   id: check-toml
    -   id: debug-statements
    -   id: destroyed-symlinks
    -   id: end-of-file-fixer
    -   id: fix-byte-order-marker
    -   id: mixed-line-ending
    -   id: trailing-whitespace
-   repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
    -   id: python-check-blanket-noqa
    -   id: python-check-blanket-type-ignore
    -   id: python-check-mock-methods
    -   id: python-no-eval
    -   id: python-no-log-warn
    -   id: python-use-type-annotations
    -   id: rst-backticks
    -   id: rst-directive-colons
    -   id: rst-inline-touching-normal
    -   id: text-unicode-replacement-char
-   repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
    - id: codespell
      args: ["-L", "ba,som,xWindows"]  # ignore some variable names
      additional_dependencies:
      - tomli
      exclude: "docs/doxyrest-config.lua.in"
-   repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
    -   id: black
        exclude: "versioneer.py|dpctl/_version.py"
-   repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
    -   id: isort
        name: isort (python)
    -   id: isort
        name: isort (cython)
        types: [cython]
    -   id: isort
        name: isort (pyi)
        types: [pyi]
-   repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
    -   id: flake8
-   repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.3
    hooks:
    -   id: clang-format
        args: ["-i"]
-   repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.16.0
    hooks:
    -   id: pretty-format-toml
        args: [--autofix]
- repo: https://github.com/MarcoGorelli/cython-lint
  rev: v0.19.0
  hooks:
  - id: cython-lint
  - id: double-quote-cython-strings

- repo: https://github.com/jumanjihouse/pre-commit-hooks
  rev: 3.0.0
  hooks:
  - id: shellcheck

- repo: https://github.com/gitleaks/gitleaks
  rev: v8.30.0
  hooks:
  - id: gitleaks

- repo: https://github.com/rhysd/actionlint
  rev: v1.7.11
  hooks:
  - id: actionlint
    args: ["-ignore", "SC2317"]
